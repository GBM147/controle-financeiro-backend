<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Relatório Mensal | GBM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Partículas — garante que o conteúdo fique acima do canvas */
        body > *:not(#particles-canvas) { position: relative; z-index: 1; }

        /* Logo flutuante no cabeçalho */
        .gbm-logo-img {
            animation: float-logo 4s ease-in-out infinite;
        }
        @keyframes float-logo {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-5px); }
        }

        /* Botão shine — aplica em todos os .btn-acao e .btn-voltar */
        .btn-acao, .btn-voltar, .btn-gerar, .btn-pdf {
            position: relative;
            overflow: hidden;
        }
        .btn-acao::after, .btn-voltar::after, .btn-gerar::after, .btn-pdf::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 30%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: btn-shine 4s infinite ease-in-out;
        }
        @keyframes btn-shine {
            0%   { left: -60%; }
            15%  { left: 130%; }
            100% { left: 130%; }
        }
        :root {
            --cor-destaque: #2E8B57;
            --cor-destaque-hover: #246e45;
            --texto-principal: #ffffff;
            --texto-mutado: #b0bec5;
            --borda: rgba(255, 255, 255, 0.15);
            --cor-receita: #10b981;
            --cor-despesa: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), url('fundo-marmore.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--texto-principal);
            min-height: 100vh;
        }

        /* CABEÇALHO GBM */
        .gbm-header {
            background: transparent;
            border-bottom: 1px solid var(--borda);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .gbm-logo-container { display: flex; align-items: center; gap: 15px; }
        .gbm-logo-img { height: 50px; width: auto; border-radius: 8px; }
        .gbm-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(90deg, #2E8B57 0%, #5fffa8 25%, #3d28ff 50%, #655aff 75%, #2E8B57 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gbm-shine 4s linear infinite;
        }
        @keyframes gbm-shine {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .btn-voltar {
            text-decoration: none;
            color: var(--texto-principal);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            background: #0f1a2b;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(95, 255, 168, 0.25);
            transition: 0.3s;
        }
        .btn-voltar:hover {
            border-color: #5fffa8;
            box-shadow: 0 0 14px rgba(95, 255, 168, 0.3);
        }

        .page-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .titulo-pagina {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 10px 0 25px 0;
        }

        /* CARD MODERNO */
        .card {
            background: #0f1a2b;
            border: 1px solid rgba(95, 255, 168, 0.22);
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(95, 255, 168, 0.05) inset;
            padding: 25px 30px;
            margin-bottom: 20px;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.25s ease;
        }
        .card:hover {
            border-color: rgba(95, 255, 168, 0.45);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.55), 0 0 14px rgba(95, 255, 168, 0.12);
        }

        /* Filtros */
        .filtros { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .filtros select,
        .filtros input[type="number"] {
            background: rgba(10, 18, 32, 0.6);
            border: 1px solid var(--borda);
            color: var(--texto-principal);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }
        .filtros select:focus,
        .filtros input[type="number"]:focus {
            border-color: var(--cor-destaque);
            box-shadow: 0 0 10px rgba(46,139,87,0.3);
        }
        .filtros input[type="number"] { width: 90px; }

        /* Botões */
        .btn-acao {
            padding: 10px 22px;
            border-radius: 8px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-gerar { background: var(--cor-destaque); color: white; }
        .btn-gerar:hover { background: var(--cor-destaque-hover); transform: translateY(-1px); }
        .btn-pdf { background: #1a56a0; color: white; }
        .btn-pdf:hover { background: #144588; transform: translateY(-1px); }

        /* Resultado */
        .resultado-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--borda);
            flex-wrap: wrap;
            gap: 15px;
        }
        .resultado-header h3 {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .resumo-rapido { display: flex; gap: 12px; flex-wrap: wrap; }
        .resumo-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(95, 255, 168, 0.15);
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 0.85rem;
            color: var(--texto-mutado);
            font-family: 'Rajdhani', sans-serif;
        }
        .resumo-item strong { display: block; font-size: 1.1rem; margin-top: 3px; letter-spacing: 0.5px; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        thead tr { border-bottom: 2px solid rgba(255,255,255,0.1); }
        th {
            padding: 12px 15px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--texto-mutado);
        }
        td {
            padding: 13px 15px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-family: 'Rajdhani', sans-serif;
        }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody tr:last-child td { border-bottom: none; }

        .badge-tipo {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-receita { background: rgba(16,185,129,0.15); color: var(--cor-receita); }
        .badge-despesa { background: rgba(239,68,68,0.15);  color: var(--cor-despesa); }

        .texto-vazio {
            text-align: center;
            color: var(--texto-mutado);
            padding: 30px 0;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .gbm-title { display: none; }
            .gbm-logo-img { height: 40px; }
            .card { padding: 18px; }
        }
                /* Modal de editar categoria */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-overlay.ativo { display: flex; }
        .modal-box {
            background: #0f1a2b; border: 1px solid rgba(95,255,168,0.3);
            border-radius: 14px; padding: 30px; width: 90%; max-width: 400px;
        }
        .modal-box h3 { margin: 0 0 8px; color: #fff; font-size: 1.1rem; }
        .modal-desc { color: #8a9ba8; font-size: 0.85rem; margin-bottom: 20px; word-break: break-word; }
        .modal-box select {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            background: #1a2a3a; border: 1px solid rgba(255,255,255,0.15);
            color: #fff; font-size: 1rem; margin-bottom: 20px;
        }
        .modal-acoes { display: flex; gap: 10px; }
        .btn-confirmar {
            flex: 1; padding: 11px; border-radius: 8px; border: none;
            background: #2E8B57; color: #fff; font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-confirmar:hover { background: #3cb371; }
        .btn-cancelar {
            flex: 1; padding: 11px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.08); color: #fff;
            font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-cancelar:hover { background: rgba(255,255,255,0.15); }
        .btn-editar-cat {
            background: none; border: 1px solid rgba(95,255,168,0.3);
            color: #5fffa8; border-radius: 6px; padding: 3px 10px;
            font-size: 0.78rem; cursor: pointer; transition: 0.2s;
            white-space: nowrap;
        }
        .btn-editar-cat:hover { background: rgba(95,255,168,0.1); }
    </style>
</head>
<body>
<canvas id="particles-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></canvas>
<header class="gbm-header">
    <div class="gbm-logo-container">
        <img src="logo-transparente.jpg" alt="Logo GBM" class="gbm-logo-img">
        <h1 class="gbm-title">Guardian Of Budget & Money</h1>
    </div>
    <a href="dashboard.html" class="btn-voltar">Voltar</a>
</header>

<div class="page-wrapper">

    <div class="card">
        <div class="filtros">
            <select id="mes-ref">
                <option value="1">Janeiro</option>
                <option value="2">Fevereiro</option>
                <option value="3">Março</option>
                <option value="4">Abril</option>
                <option value="5">Maio</option>
                <option value="6">Junho</option>
                <option value="7">Julho</option>
                <option value="8">Agosto</option>
                <option value="9">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
            <input type="number" id="ano-ref" value="2026">
            <select id="banco-ref">
                <option value="todos">Todos os bancos</option>
            </select>
            <button class="btn-acao btn-gerar" onclick="gerarRelatorio()">Gerar Relatório</button>
            <button class="btn-acao btn-pdf"   onclick="baixarPDF()">Baixar PDF 📄</button>
        </div>
    </div>

    <div class="card" id="card-resultado">
        <div id="resultado-relatorio">
            <p class="texto-vazio">Escolha o mês e o ano e clique em "Gerar Relatório".</p>
        </div>
    </div>
</div>
<!-- MODAL EDITAR CATEGORIA -->
<div class="modal-overlay" id="modal-categoria">
    <div class="modal-box">
        <h3>✏️ Alterar Categoria</h3>
        <p class="modal-desc" id="modal-desc-tx"></p>
        <select id="modal-select-cat">
            <option>Alimentação</option>
            <option>Habitação</option>
            <option>Transporte</option>
            <option>Eletricidade / Luz</option>
            <option>Telecomunicações / Internet</option>
            <option>Pagamento de Fatura</option>
            <option>Pagamento de Boleto</option>
            <option>Streaming de Vídeo</option>
            <option>Streaming de Música</option>
            <option>Academia e Fitness</option>
            <option>Saúde</option>
            <option>Educação</option>
            <option>Supermercado</option>
            <option>Restaurantes</option>
            <option>Salário</option>
            <option>Lazer</option>
            <option>Transferência</option>
            <option>Taxas Bancárias</option>
            <option>Entretenimento</option>
            <option>Igreja / Doações</option>
            <option>Outros</option>
        </select>
        <div class="modal-acoes">
            <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            <button class="btn-confirmar" onclick="salvarCategoria()">Salvar</button>
        </div>
    </div>
</div>
    <script>
        // Recupera o userId salvo (permanente com "Manter conectado", ou só da aba atual)
        function pegarUserId() {
            return localStorage.getItem('userIdAtual') || sessionStorage.getItem('userIdAtual');
        }

        if (!pegarUserId()) {
            window.location.href = 'index.html';
        }

        let dadosRelatorio = [];
let CATEGORIAS_TODAS = [];
let BANCOS_CORES = {};

async function carregarBancosInfo() {
    try {
        const res = await fetch('/bancos-info');
        BANCOS_CORES = await res.json();
    } catch (e) {
        console.error('Erro ao carregar cores de bancos:', e);
    }
}
carregarBancosInfo();

function etiquetaBanco(nomeBanco) {
    if (!nomeBanco) return '';
    const cor = BANCOS_CORES[nomeBanco] || '#607d8b';
    return `<span style="display:inline-flex; align-items:center; gap:4px; font-size:0.7rem; color:${cor}; border:1px solid ${cor}55; background:${cor}18; padding:1px 8px; border-radius:10px; margin-left:6px; white-space:nowrap;">🏦 ${nomeBanco}</span>`;
}
document.getElementById('mes-ref').value = new Date().getMonth() + 1;

const NOMES_MESES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                      'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

async function carregarCategorias() {
    try {
        const userId = pegarUserId();
        const res = await fetch(`/categorias?userId=${userId}`);
        const dados = await res.json();
        CATEGORIAS_TODAS = dados.todas || [];
    } catch (e) {
        console.error('Erro ao carregar categorias:', e);
    }
}
carregarCategorias();

async function carregarBancosUsados() {
    try {
        const userId = pegarUserId();
        const res = await fetch(`/bancos-usados?userId=${userId}`);
        const bancos = await res.json();
        const select = document.getElementById('banco-ref');
        bancos.forEach(nome => {
            select.innerHTML += `<option value="${nome}">${nome}</option>`;
        });
    } catch (e) {
        console.error('Erro ao carregar bancos usados:', e);
    }
}
carregarBancosUsados();

        async function gerarRelatorio() {
            const mes = document.getElementById('mes-ref').value;
            const ano = document.getElementById('ano-ref').value;
            const banco = document.getElementById('banco-ref').value;
            const container = document.getElementById('resultado-relatorio');
            container.innerHTML = '<p class="texto-vazio">Carregando...</p>';

            try {
                const userId = pegarUserId();
const res = await fetch(`/relatorio-detalhado?mes=${mes}&ano=${ano}&userId=${userId}&banco=${encodeURIComponent(banco)}`);
                dadosRelatorio = await res.json();

                if (dadosRelatorio.length === 0) {
                    const sufixoBanco = banco !== 'todos' ? ` (${banco})` : '';
                    container.innerHTML = `<p class="texto-vazio">Nenhum dado encontrado para ${NOMES_MESES[mes]}/${ano}${sufixoBanco}.</p>`;
                    return;
                }

                let totalReceita = 0, totalDespesa = 0;
                dadosRelatorio.forEach(item => {
                    const v = Math.abs(parseFloat(item.valor) || 0);
                    if (item.tipo === 'Receita') totalReceita += v;
                    else totalDespesa += v;
                });
                const saldo = totalReceita - totalDespesa;
                const corSaldo = saldo >= 0 ? 'var(--cor-receita)' : 'var(--cor-despesa)';

                let html = `
                    <div class="resultado-header">
                        <h3>${NOMES_MESES[mes]} / ${ano}${banco !== 'todos' ? ' — ' + banco : ''}</h3>
                        <div class="resumo-rapido">
                            <div class="resumo-item">Entradas
                                <strong style="color: var(--cor-receita);">R$ ${totalReceita.toFixed(2)}</strong>
                            </div>
                            <div class="resumo-item">Saídas
                                <strong style="color: var(--cor-despesa);">R$ ${totalDespesa.toFixed(2)}</strong>
                            </div>
                            <div class="resumo-item">Saldo
                                <strong style="color: ${corSaldo};">R$ ${saldo.toFixed(2)}</strong>
                            </div>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Categoria</th>
                                <th>Banco</th>
                                <th>Tipo</th>
                                <th style="text-align: right;">Valor</th>
                            </tr>
                        </thead>
                        <tbody>`;

                dadosRelatorio.forEach(item => {
                    const isReceita = item.tipo === 'Receita';
                    const cor    = isReceita ? 'var(--cor-receita)' : 'var(--cor-despesa)';
                    const sinal  = isReceita ? '+ ' : '- ';
                    const badge  = isReceita
                        ? '<span class="badge-tipo badge-receita">Receita</span>'
                        : '<span class="badge-tipo badge-despesa">Despesa</span>';
                    const valor  = Math.abs(parseFloat(item.valor) || 0).toFixed(2);
                    const descEscapada = (item.descricao || item.categoria).replace(/'/g, "\\'");

                    html += `
                        <tr>
                            <td style="font-weight: 500;">
                                ${item.categoria}
                                <br><button class="btn-editar-cat" onclick="abrirModal(${item.id}, '${descEscapada}', '${item.categoria}')">✏️ editar</button>
                            </td>
                            <td>${etiquetaBanco(item.banco)}</td>
                            <td>${badge}</td>
                            <td style="text-align: right; font-weight: 700; color: ${cor};">${sinal}R$ ${valor}</td>
                        </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (error) {
                container.innerHTML = '<p class="texto-vazio">Erro ao carregar o relatório. Tente novamente.</p>';
            }
        }

        function baixarPDF() {
            if (dadosRelatorio.length === 0) return gbmAlerta('Gere o relatório antes de baixar!', 'aviso');

            const mes = document.getElementById('mes-ref').value;
            const ano = document.getElementById('ano-ref').value;
            const banco = document.getElementById('banco-ref').value;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFillColor(15, 25, 42);
            doc.rect(0, 0, 210, 38, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.setFont('helvetica', 'bold');
            doc.text('GUARDIAN OF BUDGET & MONEY', 14, 15);

            doc.setFontSize(11);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(176, 190, 197);
            doc.text(`Relatório Financeiro — ${NOMES_MESES[mes]} / ${ano}${banco !== 'todos' ? ' — ' + banco : ''}`, 14, 25);
            doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')}`, 14, 32);

            let totalReceita = 0, totalDespesa = 0;
            dadosRelatorio.forEach(item => {
                const v = Math.abs(parseFloat(item.valor) || 0);
                if (item.tipo === 'Receita') totalReceita += v;
                else totalDespesa += v;
            });
            const saldo = totalReceita - totalDespesa;

            doc.setFillColor(26, 35, 50);
            doc.rect(14, 42, 55, 18, 'F');
            doc.rect(73, 42, 55, 18, 'F');
            doc.rect(132, 42, 64, 18, 'F');

            doc.setFontSize(8);
            doc.setTextColor(176, 190, 197);
            doc.text('ENTRADAS', 16, 48);
            doc.text('SAÍDAS', 75, 48);
            doc.text('SALDO DO PERÍODO', 134, 48);

            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(16, 185, 129);
            doc.text(`R$ ${totalReceita.toFixed(2)}`, 16, 56);
            doc.setTextColor(239, 68, 68);
            doc.text(`R$ ${totalDespesa.toFixed(2)}`, 75, 56);
            doc.setTextColor(saldo >= 0 ? 16 : 239, saldo >= 0 ? 185 : 68, saldo >= 0 ? 129 : 68);
            doc.text(`R$ ${saldo.toFixed(2)}`, 134, 56);

            doc.autoTable({
                head: [['Categoria', 'Banco', 'Tipo', 'Valor']],
                body: dadosRelatorio.map(i => {
                    const isReceita = i.tipo === 'Receita';
                    return [
                        i.categoria,
                        i.banco || '—',
                        i.tipo,
                        (isReceita ? '+ ' : '- ') + 'R$ ' + Math.abs(parseFloat(i.valor) || 0).toFixed(2)
                    ];
                }),
                startY: 65,
                theme: 'striped',
                headStyles: { fillColor: [15, 25, 42], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 10 },
                alternateRowStyles: { fillColor: [245, 247, 250] },
                didParseCell: function(data) {
                    if (data.cell.section === 'body') {
                        if (data.column.index === 2) {
                            data.cell.styles.textColor = data.cell.raw === 'Receita' ? [16, 185, 129] : [239, 68, 68];
                            data.cell.styles.fontStyle = 'bold';
                        }
                        if (data.column.index === 3) {
                            data.cell.styles.textColor = String(data.cell.raw).startsWith('+') ? [16, 185, 129] : [239, 68, 68];
                            data.cell.styles.fontStyle = 'bold';
                        }
                    }
                },
                columnStyles: { 3: { halign: 'right' } }
            });

            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.setTextColor(176, 190, 197);
                doc.text('Guardian of Budget & Money — Relatório Confidencial',
                    14, doc.internal.pageSize.height - 8);
            }

            doc.save(`GBM-relatorio-${NOMES_MESES[mes]}-${ano}${banco !== 'todos' ? '-' + banco.replace(/\s+/g, '') : ''}.pdf`);
        }

    let txIdAtual = null;

        function abrirModal(id, descricao, categoriaAtual) {
    txIdAtual = id;
    document.getElementById('modal-desc-tx').innerText = descricao;

    const select = document.getElementById('modal-select-cat');
    if (CATEGORIAS_TODAS.length > 0) {
        select.innerHTML = CATEGORIAS_TODAS
            .map(c => `<option value="${c}">${c}</option>`)
            .join('');
    }
    document.getElementById('modal-select-cat').value = categoriaAtual;
    document.getElementById('modal-categoria').classList.add('ativo');
}

        function fecharModal() {
            txIdAtual = null;
            document.getElementById('modal-categoria').classList.remove('ativo');
        }

        async function salvarCategoria() {
            if (!txIdAtual) return;
            const novaCategoria = document.getElementById('modal-select-cat').value;
            try {
                const res = await fetch(`/atualizar-categoria/${txIdAtual}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categoria: novaCategoria })
                });
                const json = await res.json();
                if (json.success) {
                    fecharModal();
                    gerarRelatorio(); // recarrega o relatório com a nova categoria
                } else {
                    gbmAlerta('Erro ao salvar. Tente novamente.', 'erro');
                }
            } catch (e) {
                gbmAlerta('Falha na comunicação com o servidor.', 'erro');
            }
        }

        // Fechar modal clicando fora
        document.getElementById('modal-categoria').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });

        // --- SISTEMA GBM DE NOTIFICAÇÕES/CONFIRMAÇÕES (padronizado em todas as páginas) ---
        let _resolveConfirm = null;

        function gbmAlerta(mensagem, tipo = 'info') {
            const cor   = tipo === 'erro'  ? 'rgba(239,68,68,0.3)'
                        : tipo === 'aviso' ? 'rgba(245,158,11,0.3)'
                        :                    'rgba(95,255,168,0.3)';
            const icone = tipo === 'erro'  ? '❌'
                        : tipo === 'aviso' ? '⚠️'
                        :                    '✅';

            document.getElementById('lista-notificacoes-modal').innerHTML = `
                <div style="background:rgba(15,23,42,0.8); border:1px solid ${cor}; border-radius:10px; padding:20px; font-family:'Inter',sans-serif; font-size:0.95rem; line-height:1.6; text-align:center;">
                    <div style="font-size:2.2rem; margin-bottom:12px;">${icone}</div>
                    ${mensagem}
                </div>`;

            document.getElementById('btn-confirmar-modal').style.display = 'none';
            document.getElementById('btn-fechar-modal').innerText = 'FECHAR';
            document.getElementById('modal-notificacoes').style.display = 'flex';
            _resolveConfirm = null;
        }

        function gbmConfirmar(mensagem) {
            return new Promise(resolve => {
                _resolveConfirm = resolve;

                document.getElementById('lista-notificacoes-modal').innerHTML = `
                    <div style="background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.4); border-radius:10px; padding:20px; font-family:'Inter',sans-serif; font-size:0.95rem; line-height:1.6; text-align:center;">
                        <div style="font-size:2.2rem; margin-bottom:12px;">⚠️</div>
                        ${mensagem}
                    </div>`;

                document.getElementById('btn-confirmar-modal').style.display = 'block';
                document.getElementById('btn-fechar-modal').innerText = 'CANCELAR';
                document.getElementById('modal-notificacoes').style.display = 'flex';
            });
        }

        function fecharModalNotificacoes(confirmado = false) {
            document.getElementById('modal-notificacoes').style.display = 'none';
            if (_resolveConfirm) {
                _resolveConfirm(confirmado);
                _resolveConfirm = null;
            }
        }
    </script>

    <!-- MODAL DE NOTIFICAÇÕES GBM -->
    <div id="modal-notificacoes" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); z-index:99999; align-items:center; justify-content:center;">
        <div style="background:#0f1a2b; border:1px solid rgba(95,255,168,0.3); border-radius:16px; padding:30px; max-width:460px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.7);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="logo-transparente.jpg" alt="GBM" style="height:28px;">
                    <span style="font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; letter-spacing:2px; color:#5fffa8;">GBM — NOTIFICAÇÕES</span>
                </div>
                <button onclick="fecharModalNotificacoes(false)" style="background:none; border:none; color:#b0bec5; font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
            </div>
            <div id="lista-notificacoes-modal"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="btn-confirmar-modal" onclick="fecharModalNotificacoes(true)" style="display:none; flex:1; padding:12px; background:#2E8B57; color:#fff; border:none; border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='#246e45'" onmouseout="this.style.background='#2E8B57'">CONFIRMAR</button>
                <button id="btn-fechar-modal" onclick="fecharModalNotificacoes(false)" style="flex:1; padding:12px; background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.15); border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">FECHAR</button>
            </div>
        </div>
    </div>
<script>
    // --- PARTÍCULAS DOURADAS GBM ---
    (function() {
        const canvas = document.getElementById('particles-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function Particle() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 100;
            this.size = Math.random() * 2.5 + 0.8;
            this.speedY = Math.random() * 1.2 + 0.3;
            this.opacity = Math.random() * 0.4 + 0.2;
        }
        Particle.prototype.update = function() {
            this.y -= this.speedY;
            if (this.y < -10) {
                this.y = canvas.height + 10;
                this.x = Math.random() * canvas.width;
                this.opacity = Math.random() * 0.4 + 0.2;
            }
        };
        Particle.prototype.draw = function() {
            ctx.fillStyle = `rgba(200, 159, 83, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        };

        const count = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 15000), 65);
        for (let i = 0; i < count; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
