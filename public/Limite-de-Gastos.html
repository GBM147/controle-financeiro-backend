
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>LIMITE DE GASTOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --cor-destaque: #2E8B57;
            --texto-principal: #ffffff;
            --texto-mutado: #b0bec5;
            --texto-mutated: #b0bec5;
            --borda: rgba(255, 255, 255, 0.15);
            --cor-receita: #10b981;
            --cor-despesa: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), url('fundo-marmore.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--texto-principal);
            min-height: 100vh;
        }

        /* --- CABEÇALHO GBM (igual ao dashboard) --- */
        .gbm-header {
            background: transparent;
            border-bottom: 1px solid var(--borda);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .gbm-logo-container { display: flex; align-items: center; gap: 15px; }
        .gbm-logo-img {    
    height: 50px;    
    width: auto;    
    border-radius: 8px;    
    display: inline-block;    
    transform-origin: center center;    
    animation: rolar 8s linear infinite; /* Nome da animação alterado */
}

@keyframes rolar {
    0% { transform: translateX(0px) rotate(0deg); }
    100% { transform: translateX(200px) rotate(360deg); }
}

        .gbm-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(90deg, #2E8B57 0%, #5fffa8 25%, #3d28ff 50%, #655aff 75%, #2E8B57 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gbm-shine 4s linear infinite;
        }
        @keyframes gbm-shine {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .btn-voltar {
            text-decoration: none;
            color: var(--texto-principal);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            background: #0f1a2b;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(95, 255, 168, 0.25);
            transition: 0.3s;
        }
        .btn-voltar:hover {
            border-color: #5fffa8;
            box-shadow: 0 0 14px rgba(95, 255, 168, 0.3);
        }

        /* Conteúdo */
        .page-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .titulo-pagina {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 10px 0 25px 0;
            color: var(--texto-principal);
        }

        /* --- CARD MODERNO (sólido escuro + borda neon) --- */
        .card {
            background: #0f1a2b;
            border: 1px solid rgba(95, 255, 168, 0.22);
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(95, 255, 168, 0.05) inset;
            padding: 25px 30px;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.25s ease;
        }
        .card:hover {
            border-color: rgba(95, 255, 168, 0.45);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.55), 0 0 14px rgba(95, 255, 168, 0.12);
        }

        .card h2 {
            margin-top: 0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Botão de ação */
        .btn-acao {
            padding: 10px 20px;
            border-radius: 8px;
            background: var(--cor-destaque);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .btn-acao:hover {
            background: #246e45;
            transform: translateY(-2px);
        }

        /* Itens do editor */
        #editor-container div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #editor-container span {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Inputs e slider */
        #editor-container input[type="number"],
        #editor-container input[type="text"] {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--borda);
            color: var(--texto-principal);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            padding: 8px 12px;
            border-radius: 8px;
            width: 100px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }
        #editor-container input[type="number"]:focus,
        #editor-container input[type="text"]:focus {
            border-color: var(--cor-destaque);
            box-shadow: 0 0 10px rgba(46, 139, 87, 0.4);
        }
        #editor-container input[type="range"] {
            accent-color: var(--cor-destaque);
            cursor: pointer;
            margin: 0 15px;
        }

        @media (max-width: 768px) {
            .gbm-title { display: none; }
            .gbm-logo-img { height: 40px; }
            .card { padding: 18px; }
        }
        /* --- ESTILOS DA BARRA DE PROGRESSO --- */
        .meta-item { 
            background: rgba(0,0,0,0.25); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 20px;
        }
        .meta-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            font-size: 1.05rem; 
            font-family: 'Rajdhani', sans-serif; 
            letter-spacing: 0.5px; 
        }
        .barra-container { 
            width: 100%; 
            height: 10px; 
            background: rgba(255,255,255,0.08); 
            border-radius: 5px; 
            overflow: hidden; 
            margin-bottom: 10px; 
        }
        .barra-progresso { 
            height: 100%; 
            transition: width 0.5s ease-in-out; 
            border-radius: 5px; 
        }
        .meta-footer { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.9rem; 
            color: var(--texto-mutado); 
            font-family: 'Rajdhani', sans-serif; 
        }
        .badge { 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            color: #fff; 
            margin-left: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
    </style>
</head>
<body>

<!-- CABEÇALHO GBM -->
<header class="gbm-header">
    <div class="gbm-logo-container">
        <img src="logo-transparente.jpg" alt="Logo GBM" class="gbm-logo-img">
        <h1 class="gbm-title">Guardian Of Budget & Money</h1>
    </div>
    <a href="dashboard.html" class="btn-voltar">Voltar</a>
</header>

<div class="page-wrapper">
    <h1 class="titulo-pagina">Atenção ao Limite ⚠️</h1>

    <div class="card">
        <h2>Personalize o Limite e Quando Devemos Avisar</h2>
        <h2>Definir ou Ajustar Limite</h2>
        
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <select id="nova-meta-cat" style="padding: 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--borda); flex: 1; min-width: 150px;">
                <option value="" disabled selected>Categoria...</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Habitação">Habitação</option>
                <option value="Transporte">Transporte</option>
                <option value="Educação">Educação</option>
                <option value="Lazer">Lazer</option>
                <option value="Outros">Outros</option>
            </select>

            <div style="position: relative; flex: 1; min-width: 120px;">
                <span style="position: absolute; left: 12px; top: 10px; color: var(--texto-mutated);">R$</span>
                <input type="number" id="nova-meta-valor" placeholder="0.00" style="padding: 10px 10px 10px 35px; border-radius: 8px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--borda); width: calc(100% - 50px);">
            </div>

            <div style="display: flex; align-items: center; gap: 10px; flex: 2; min-width: 180px;">
                <span style="font-size: 0.9rem; color: var(--texto-mutado);">Avisar em:</span>
                <input type="range" id="nova-meta-alerta" value="80" min="10" max="100" step="10" oninput="document.getElementById('display-novo-alerta').innerText = this.value + '%'" style="flex: 1; accent-color: var(--cor-destaque);">
                <span id="display-novo-alerta" style="font-weight: bold; color: var(--cor-destaque); width: 45px;">80%</span>
            </div>

            <button onclick="salvarNovoLimite()" class="btn-acao" style="flex: 1; min-width: 130px;">Gravar</button>
        </div>

        <div id="editor-container"></div>
    </div>
</div>

    <script>
        async function carregarEditor() {
            try {
                const res = await fetch('/metas-resumo');
                const json = await res.json();
                let metas = json.data ? json.data : (Array.isArray(json) ? json : []);
                
                const despesasPadrao = ["Alimentação", "Habitação", "Transporte", "Eletricidade / Luz", "Telecomunicações / Internet", "Pagamento de Fatura", "Pagamento de Boleto", "Streaming de Vídeo", "Streaming de Música", "Academia e Fitness", "Saúde", "Educação", "Supermercado", "Restaurantes", "Salário", "Lazer", "Outros"];

                // FILTRO: Mantém apenas as Despesas Padrão (Limites)
                metas = metas.filter(m => m.categoria && despesasPadrao.includes(m.categoria));

                const container = document.getElementById('editor-container');
                container.innerHTML = '';

                if (metas.length === 0) {
                    container.innerHTML = '<p style="color: var(--texto-mutated); text-align: center; padding: 20px;">Nenhum limite de gastos definido. Crie no Dashboard.</p>';
                    return;
                }

                metas.forEach(m => {
                    const catId = m.categoria.replace(/\s+/g, '-');
                    const valorAtual = m.percentual_alerta || 80;
                    
                    const limite = parseFloat(String(m.limite || 0).replace(/[R$\s+\-]/g, ''));
                    const gasto = parseFloat(String(m.gasto || 0).replace(/[R$\s+\-]/g, ''));

                    let percentual = limite > 0 ? (gasto / limite) * 100 : 0;
                    const larguraBarra = Math.min(percentual, 100);

                    // Lógica de cores para Limite: Verde (Tranquilo) -> Laranja (Alerta) -> Vermelho (Estourou)
                    let cor = '';
                    if (percentual < 75) cor = 'var(--cor-receita)';
                    else if (percentual < 100) cor = '#f59e0b';
                    else cor = 'var(--cor-despesa)';

                    container.innerHTML += `
                        <div class="meta-item">
                            <div class="meta-header">
                                <div>
                                    <strong>${m.categoria}</strong>
                                    <span class="badge" style="background: var(--texto-mutated);">Limite 🛑</span>
                                </div>
                                <strong style="color: ${cor};">${percentual.toFixed(1)}%</strong>
                            </div>
                            <div class="barra-container">
                                <div class="barra-progresso" style="width: ${larguraBarra}%; background: ${cor};"></div>
                            </div>
                            <div class="meta-footer" style="margin-bottom: 20px;">
                                <span>R$ ${gasto.toFixed(2)} de R$ ${limite.toFixed(2)}</span>
                                <span>Gasto</span>
                            </div>

                            <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
                                <div style="position: relative;">
                                    <span style="position: absolute; left: 10px; top: 10px; color: var(--texto-mutated);">R$</span>
                                    <input type="number" id="limite-${catId}" value="${limite}" style="padding-left: 35px; width: 85px;" placeholder="0,00">
                                </div>

                                <div style="display: flex; align-items: center; gap: 5px; flex: 1; min-width: 180px;">
                                    <span style="font-size: 0.85rem; color: var(--texto-mutado);">Aviso em:</span>
                                    <input type="range" id="alerta-${catId}" value="${valorAtual}" min="10" max="100" step="10"
                                        oninput="document.getElementById('display-${catId}').innerText = this.value + '%'">
                                    <span id="display-${catId}" style="width: 45px; font-weight: bold; color: var(--cor-destaque); text-align: right;">${valorAtual}%</span>
                                </div>

                                <button onclick="salvarAlteracao('${m.categoria}', '${catId}')" class="btn-acao">Salvar</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erro Fatal:", error);
                document.getElementById('editor-container').innerHTML = '<p style="color: #ff4d4d; text-align: center;">Erro ao carregar dados.</p>';
            }
        }

        function ajustarSlider(catId, mudanca) {
            const slider = document.getElementById(`alerta-${catId}`);
            let novoValor = parseInt(slider.value) + mudanca;
            if (novoValor > 100) novoValor = 100;
            if (novoValor < 10) novoValor = 10;
            slider.value = novoValor;
            document.getElementById(`display-${catId}`).innerText = novoValor + '%';
        }

        async function salvarAlteracao(categoriaOriginal, catId) {
            const valor_limite = document.getElementById(`limite-${catId}`).value;
            const percentual_alerta = document.getElementById(`alerta-${catId}`).value;

            await fetch('/atualizar-meta-alerta', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ categoria: categoriaOriginal, valor_limite, percentual_alerta })
            });
            alert("Regra gravada com sucesso!");
        }

        carregarEditor();
    </script>
</body>
</html>
