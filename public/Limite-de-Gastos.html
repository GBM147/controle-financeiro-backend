<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>LIMITE DE GASTOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Partículas — garante que o conteúdo fique acima do canvas */
        body > *:not(#particles-canvas) { position: relative; z-index: 1; }

        /* Logo flutuante no cabeçalho */
        .gbm-logo-img {
            animation: float-logo 4s ease-in-out infinite;
        }
        @keyframes float-logo {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-5px); }
        }

        /* Botão shine — aplica em todos os .btn-acao e .btn-voltar */
        .btn-acao, .btn-voltar, .btn-gerar, .btn-pdf {
            position: relative;
            overflow: hidden;
        }
        .btn-acao::after, .btn-voltar::after, .btn-gerar::after, .btn-pdf::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 30%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: btn-shine 4s infinite ease-in-out;
        }
        @keyframes btn-shine {
            0%   { left: -60%; }
            15%  { left: 130%; }
            100% { left: 130%; }
        }
        :root {
            --cor-destaque: #2E8B57;
            --texto-principal: #ffffff;
            --texto-mutado: #b0bec5;
            --texto-mutated: #b0bec5;
            --borda: rgba(255, 255, 255, 0.15);
            --cor-receita: #10b981;
            --cor-despesa: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), url('fundo-marmore.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--texto-principal);
            min-height: 100vh;
        }

        /* --- CABEÇALHO GBM (igual ao dashboard) --- */
        .gbm-header {
            background: transparent;
            border-bottom: 1px solid var(--borda);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .gbm-logo-container { display: flex; align-items: center; gap: 15px; }
        .gbm-logo-img { height: 50px; width: auto; border-radius: 8px; }
        .gbm-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(90deg, #2E8B57 0%, #5fffa8 25%, #3d28ff 50%, #655aff 75%, #2E8B57 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gbm-shine 4s linear infinite;
        }
        @keyframes gbm-shine {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .btn-voltar {
            text-decoration: none;
            color: var(--texto-principal);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            background: #0f1a2b;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(95, 255, 168, 0.25);
            transition: 0.3s;
        }
        .btn-voltar:hover {
            border-color: #5fffa8;
            box-shadow: 0 0 14px rgba(95, 255, 168, 0.3);
        }

        /* Conteúdo */
        .page-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .titulo-pagina {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 10px 0 25px 0;
            color: var(--texto-principal);
        }

        /* --- CARD MODERNO (sólido escuro + borda neon) --- */
        .card {
            background: #0f1a2b;
            border: 1px solid rgba(95, 255, 168, 0.22);
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(95, 255, 168, 0.05) inset;
            padding: 25px 30px;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.25s ease;
        }
        .card:hover {
            border-color: rgba(95, 255, 168, 0.45);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.55), 0 0 14px rgba(95, 255, 168, 0.12);
        }

        .card h2 {
            margin-top: 0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Botão de ação */
        .btn-acao {
            padding: 10px 20px;
            border-radius: 8px;
            background: var(--cor-destaque);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .btn-acao:hover {
            background: #246e45;
            transform: translateY(-2px);
        }

.controles-edicao {
    display: flex; 
    gap: 10px; 
    align-items: center; 
    flex-wrap: wrap; 
    background: rgba(0,0,0,0.2);
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    border: 1px solid rgba(255,255,255,0.05);
}

        /* Inputs e slider */
        #editor-container input[type="number"],
        #editor-container input[type="text"] {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--borda);
            color: var(--texto-principal);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            padding: 8px 12px;
            border-radius: 8px;
            width: 100px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }
        #editor-container input[type="number"]:focus,
        #editor-container input[type="text"]:focus {
            border-color: var(--cor-destaque);
            box-shadow: 0 0 10px rgba(46, 139, 87, 0.4);
        }
        @media (max-width: 768px) {
            .gbm-title { display: none; }
            .gbm-logo-img { height: 40px; }
            .card { padding: 18px; }
        }
        /* --- ESTILOS DA BARRA DE PROGRESSO --- */
        .meta-item { 
            background: rgba(0,0,0,0.25); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 20px;
        }
        .meta-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            font-size: 1.05rem; 
            font-family: 'Rajdhani', sans-serif; 
            letter-spacing: 0.5px; 
        }
        .barra-container { 
            width: 100%; 
            height: 10px; 
            background: rgba(255,255,255,0.08); 
            border-radius: 5px; 
            overflow: hidden; 
            margin-bottom: 10px; 
        }
        .barra-progresso { 
            height: 100%; 
            transition: width 0.5s ease-in-out; 
            border-radius: 5px; 
        }
        .meta-footer { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.9rem; 
            color: var(--texto-mutado); 
            font-family: 'Rajdhani', sans-serif; 
        }
        .badge { 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            color: #fff; 
            margin-left: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        /* Editor compacto de limites */
        .form-limite {
            display: grid;
            grid-template-columns: minmax(170px, 1.2fr) minmax(140px, 0.8fr);
            gap: 16px;
            padding-bottom: 22px;
            margin-bottom: 22px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .campo-form {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .campo-form label {
            color: var(--texto-mutado);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .campo-form select,
        .campo-form input {
            box-sizing: border-box;
            width: 100%;
            min-height: 42px;
            padding: 10px 12px;
            border: 1px solid var(--borda);
            border-radius: 8px;
            outline: none;
            background: rgba(15, 23, 42, 0.72);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .campo-form select:focus,
        .campo-form input:focus {
            border-color: var(--cor-destaque);
            box-shadow: 0 0 0 3px rgba(46, 139, 87, 0.16);
        }

        .campo-percentuais {
            grid-column: 1 / -1;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: rgba(0,0,0,0.16);
        }

        .linha-adicionar-percentual {
            display: grid;
            grid-template-columns: minmax(120px, 180px) auto;
            gap: 9px;
            max-width: 330px;
        }

        .btn-secundario {
            min-height: 42px;
            padding: 8px 14px;
            border: 1px solid rgba(95,255,168,0.32);
            border-radius: 8px;
            background: rgba(46,139,87,0.12);
            color: #cffff0;
            cursor: pointer;
            font-weight: 700;
        }

        .chips-percentuais {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .chip-percentual {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 9px 6px 11px;
            border: 1px solid rgba(95,255,168,0.32);
            border-radius: 999px;
            background: rgba(46,139,87,0.14);
            color: #8dffc1;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .chip-percentual button {
            width: 20px;
            height: 20px;
            padding: 0;
            border: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            line-height: 20px;
        }

        .chips-visualizacao .chip-percentual {
            padding-right: 11px;
        }

        .dica-percentuais {
            margin: 7px 0 0;
            color: var(--texto-mutado);
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            line-height: 1.45;
        }

        .acoes-form {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
        }

        .btn-editar-limite {
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 7px;
            background: rgba(255,255,255,0.05);
            color: var(--texto-principal);
            cursor: pointer;
            font-size: 0.75rem;
        }

        .alertas-configurados {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        @media (max-width: 620px) {
            .form-limite { grid-template-columns: 1fr; }
            .campo-percentuais,
            .acoes-form { grid-column: 1; }
            .linha-adicionar-percentual { grid-template-columns: 1fr auto; }
            .card { padding: 20px 16px; }
        }
    </style>
</head>
<body>
<canvas id="particles-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></canvas>
<!-- CABEÇALHO GBM -->
<header class="gbm-header">
    <div class="gbm-logo-container">
        <img src="logo-transparente.jpg" alt="Logo GBM" class="gbm-logo-img">
        <h1 class="gbm-title">Guardian Of Budget & Money</h1>
    </div>
    <a href="dashboard.html" class="btn-voltar">Voltar</a>
</header>

<div class="page-wrapper">
    <div class="card">
        <h2>Definir ou Ajustar Limite</h2>
        
        <div class="form-limite" id="form-limite">
            <div class="campo-form">
                <label for="nova-meta-cat">Categoria</label>
                <select id="nova-meta-cat">
                    <option value="" disabled selected>Selecione...</option>
                    <option value="Alimentação">Alimentação</option>
                    <option value="Habitação">Habitação</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Eletricidade / Luz">Eletricidade / Luz</option>
                    <option value="Telecomunicações / Internet">Telecomunicações / Internet</option>
                    <option value="Pagamento de Fatura">Pagamento de Fatura</option>
                    <option value="Pagamento de Boleto">Pagamento de Boleto</option>
                    <option value="Streaming de Vídeo">Streaming de Vídeo</option>
                    <option value="Streaming de Música">Streaming de Música</option>
                    <option value="Academia e Fitness">Academia e Fitness</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Educação">Educação</option>
                    <option value="Supermercado">Supermercado</option>
                    <option value="Restaurantes">Restaurantes</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>

            <div class="campo-form">
                <label for="nova-meta-valor">Limite mensal</label>
                <input type="number" id="nova-meta-valor" min="0.01" step="0.01" placeholder="R$ 0,00">
            </div>

            <div class="campo-form campo-percentuais">
                <label for="novo-percentual">Quando você quer ser avisado?</label>
                <div class="linha-adicionar-percentual">
                    <input type="number" id="novo-percentual" min="1" max="100" step="1" placeholder="Ex.: 50">
                    <button type="button" class="btn-secundario" onclick="adicionarPercentual()">+ Adicionar</button>
                </div>
                <div id="chips-percentuais-novo" class="chips-percentuais"></div>
                <p class="dica-percentuais">Você pode criar vários avisos, como 50%, 70% e 90%. Cada percentual será avisado apenas uma vez por mês.</p>
            </div>

            <div class="acoes-form">
                <button onclick="salvarNovoLimite()" class="btn-acao">Salvar limite</button>
            </div>
        </div>

        <div id="editor-container"></div>
    </div>
</div>

<script src="auth.js"></script>
    <script>
        // Recupera o userId salvo (mesmo padrão usado no resto do app)
        function pegarUserId() {
            return localStorage.getItem('userIdAtual') || sessionStorage.getItem('userIdAtual');
        }
        const userId = pegarUserId();
        if (!userId) window.location.href = 'index.html';

        let percentuaisSelecionados = [50, 70];
        let metasCarregadas = [];

        function normalizarPercentuais(valores) {
            return [...new Set(
                (Array.isArray(valores) ? valores : [])
                    .map(Number)
                    .filter(valor => Number.isInteger(valor) && valor >= 1 && valor <= 100)
            )].sort((a, b) => a - b);
        }

        function renderizarPercentuaisSelecionados() {
            const container = document.getElementById('chips-percentuais-novo');
            container.innerHTML = percentuaisSelecionados.map(percentual => `
                <span class="chip-percentual">
                    ${percentual}%
                    <button type="button" onclick="removerPercentual(${percentual})" aria-label="Remover aviso de ${percentual}%">&times;</button>
                </span>
            `).join('');
        }

        function adicionarPercentual() {
            const input = document.getElementById('novo-percentual');
            const percentual = Number(input.value);

            if (!Number.isInteger(percentual) || percentual < 1 || percentual > 100) {
                gbmAlerta('Digite um percentual inteiro entre 1% e 100%.', 'aviso');
                return;
            }

            percentuaisSelecionados = normalizarPercentuais([...percentuaisSelecionados, percentual]);
            input.value = '';
            renderizarPercentuaisSelecionados();
            input.focus();
        }

        function removerPercentual(percentual) {
            percentuaisSelecionados = percentuaisSelecionados.filter(valor => valor !== percentual);
            renderizarPercentuaisSelecionados();
        }

        function escaparHtml(valor) {
            return String(valor ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function editarLimite(indice) {
            const meta = metasCarregadas[indice];
            if (!meta) return;

            const seletorCategoria = document.getElementById('nova-meta-cat');
            if (![...seletorCategoria.options].some(opcao => opcao.value === meta.categoria)) {
                seletorCategoria.add(new Option(meta.categoria, meta.categoria));
            }
            seletorCategoria.value = meta.categoria;
            document.getElementById('nova-meta-valor').value = Number(meta.limite || 0).toFixed(2);
            percentuaisSelecionados = normalizarPercentuais(meta.percentuais_alerta);
            renderizarPercentuaisSelecionados();
            document.getElementById('form-limite').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function carregarEditor() {
            try {
                const res = await fetchApi('/metas-resumo?userId=' + userId);
                if (!res.ok) throw new Error('Falha ao carregar limites.');
                const json = await res.json();
                let metas = json.data ? json.data : (Array.isArray(json) ? json : []);
                
                const despesasPadrao = ["Alimentação", "Habitação", "Transporte", "Eletricidade / Luz", "Telecomunicações / Internet", "Pagamento de Fatura", "Pagamento de Boleto", "Streaming de Vídeo", "Streaming de Música", "Academia e Fitness", "Saúde", "Educação", "Supermercado", "Restaurantes", "Salário", "Lazer", "Outros"];

                // FILTRO: Mantém apenas as Despesas Padrão (Limites)
                metas = metas.filter(m => m.categoria && despesasPadrao.includes(m.categoria));
                metasCarregadas = metas;

                const container = document.getElementById('editor-container');
                container.innerHTML = '';

                if (metas.length === 0) {
                    container.innerHTML = '<p style="color: var(--texto-mutado); text-align: center; padding: 20px;">Você ainda não definiu limites. Use o formulário acima para criar o primeiro.</p>';
                    return;
                }

                metas.forEach((m, indice) => {
                    const limite = parseFloat(String(m.limite || 0).replace(/[R$\s+\-]/g, ''));
                    const gasto = parseFloat(String(m.gasto || 0).replace(/[R$\s+\-]/g, ''));
                    const percentuais = normalizarPercentuais(m.percentuais_alerta);

                    let percentual = limite > 0 ? (gasto / limite) * 100 : 0;
                    const larguraBarra = Math.min(percentual, 100);

                    // Lógica de cores para Limite: Verde (Tranquilo) -> Laranja (Alerta) -> Vermelho (Estourou)
                    let cor = '';
                    if (percentual < 75) cor = 'var(--cor-receita)';
                    else if (percentual < 100) cor = '#f59e0b';
                    else cor = 'var(--cor-despesa)';

                    container.innerHTML += `
                        <div class="meta-item">
                            <div class="meta-header">
                                <div>
                                    <strong>${escaparHtml(m.categoria)}</strong>
                                </div>
                                <strong style="color: ${cor};">${percentual.toFixed(1)}%</strong>
                            </div>
                            <div class="barra-container">
                                <div class="barra-progresso" style="width: ${larguraBarra}%; background: ${cor};"></div>
                            </div>
                            <div class="meta-footer">
                                <span>R$ ${gasto.toFixed(2)} de R$ ${limite.toFixed(2)}</span>
                                <span>Gasto</span>
                            </div>

                            <div class="alertas-configurados">
                                <div>
                                    <span style="font-size: 0.78rem; color: var(--texto-mutado);">Avisos configurados</span>
                                    <div class="chips-percentuais chips-visualizacao">
                                        ${percentuais.map(valor => `<span class="chip-percentual">${valor}%</span>`).join('')}
                                    </div>
                                </div>
                                <button type="button" class="btn-editar-limite" onclick="editarLimite(${indice})">Editar</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erro Fatal:", error);
                document.getElementById('editor-container').innerHTML = '<p style="color: #ff4d4d; text-align: center;">Erro ao carregar dados.</p>';
            }
        }

        async function salvarNovoLimite() {
            const categoria = document.getElementById('nova-meta-cat').value;
            const valor_limite = parseFloat(document.getElementById('nova-meta-valor').value);
            const percentuais_alerta = normalizarPercentuais(percentuaisSelecionados);

            if (!categoria || !Number.isFinite(valor_limite) || valor_limite <= 0) {
                gbmAlerta('Selecione uma categoria e informe um limite maior que zero.', 'aviso');
                return;
            }

            if (percentuais_alerta.length === 0) {
                gbmAlerta('Adicione pelo menos um percentual de aviso.', 'aviso');
                return;
            }

            try {
                const res = await fetchApi('/atualizar-meta-alerta', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ categoria, valor_limite, percentuais_alerta })
                });

                if (res.ok) {
                    gbmAlerta('Limite e avisos salvos com sucesso!');
                    
                    document.getElementById('nova-meta-cat').value = "";
                    document.getElementById('nova-meta-valor').value = "";
                    percentuaisSelecionados = [50, 70];
                    renderizarPercentuaisSelecionados();
                    
                    carregarEditor();
                } else {
                    const erro = await res.json().catch(() => ({}));
                    gbmAlerta(erro.error || 'Erro ao gravar o limite no servidor.', 'erro');
                }
            } catch (error) {
                console.error("Erro ao salvar:", error);
                gbmAlerta("Erro de conexão ao tentar salvar o limite.", 'erro');
            }
        }
        document.getElementById('novo-percentual').addEventListener('keydown', (evento) => {
            if (evento.key === 'Enter') {
                evento.preventDefault();
                adicionarPercentual();
            }
        });
        renderizarPercentuaisSelecionados();
        carregarEditor();

        // --- SISTEMA GBM DE NOTIFICAÇÕES/CONFIRMAÇÕES (padronizado em todas as páginas) ---
        let _resolveConfirm = null;

        function gbmAlerta(mensagem, tipo = 'info') {
            const cor   = tipo === 'erro'  ? 'rgba(239,68,68,0.3)'
                        : tipo === 'aviso' ? 'rgba(245,158,11,0.3)'
                        :                    'rgba(95,255,168,0.3)';
            const icone = tipo === 'erro'  ? '❌'
                        : tipo === 'aviso' ? '⚠️'
                        :                    '✅';

            document.getElementById('lista-notificacoes-modal').innerHTML = `
                <div style="background:rgba(15,23,42,0.8); border:1px solid ${cor}; border-radius:10px; padding:20px; font-family:'Inter',sans-serif; font-size:0.95rem; line-height:1.6; text-align:center;">
                    <div style="font-size:2.2rem; margin-bottom:12px;">${icone}</div>
                    ${mensagem}
                </div>`;

            document.getElementById('btn-confirmar-modal').style.display = 'none';
            document.getElementById('btn-fechar-modal').innerText = 'FECHAR';
            document.getElementById('modal-notificacoes').style.display = 'flex';
            _resolveConfirm = null;
        }

        function gbmConfirmar(mensagem) {
            return new Promise(resolve => {
                _resolveConfirm = resolve;

                document.getElementById('lista-notificacoes-modal').innerHTML = `
                    <div style="background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.4); border-radius:10px; padding:20px; font-family:'Inter',sans-serif; font-size:0.95rem; line-height:1.6; text-align:center;">
                        <div style="font-size:2.2rem; margin-bottom:12px;">⚠️</div>
                        ${mensagem}
                    </div>`;

                document.getElementById('btn-confirmar-modal').style.display = 'block';
                document.getElementById('btn-fechar-modal').innerText = 'CANCELAR';
                document.getElementById('modal-notificacoes').style.display = 'flex';
            });
        }

        function fecharModalNotificacoes(confirmado = false) {
            document.getElementById('modal-notificacoes').style.display = 'none';
            if (_resolveConfirm) {
                _resolveConfirm(confirmado);
                _resolveConfirm = null;
            }
        }
    </script>

    <!-- MODAL DE NOTIFICAÇÕES GBM -->
    <div id="modal-notificacoes" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); z-index:99999; align-items:center; justify-content:center;">
        <div style="background:#0f1a2b; border:1px solid rgba(95,255,168,0.3); border-radius:16px; padding:30px; max-width:460px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.7);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="logo-transparente.jpg" alt="GBM" style="height:28px;">
                    <span style="font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; letter-spacing:2px; color:#5fffa8;">GBM — NOTIFICAÇÕES</span>
                </div>
                <button onclick="fecharModalNotificacoes(false)" style="background:none; border:none; color:#b0bec5; font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
            </div>
            <div id="lista-notificacoes-modal"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="btn-confirmar-modal" onclick="fecharModalNotificacoes(true)" style="display:none; flex:1; padding:12px; background:#2E8B57; color:#fff; border:none; border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='#246e45'" onmouseout="this.style.background='#2E8B57'">CONFIRMAR</button>
                <button id="btn-fechar-modal" onclick="fecharModalNotificacoes(false)" style="flex:1; padding:12px; background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.15); border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">FECHAR</button>
            </div>
        </div>
    </div>
<script>
    // --- PARTÍCULAS DOURADAS GBM ---
    (function() {
        const canvas = document.getElementById('particles-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function Particle() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 100;
            this.size = Math.random() * 2.5 + 0.8;
            this.speedY = Math.random() * 1.2 + 0.3;
            this.opacity = Math.random() * 0.4 + 0.2;
        }
        Particle.prototype.update = function() {
            this.y -= this.speedY;
            if (this.y < -10) {
                this.y = canvas.height + 10;
                this.x = Math.random() * canvas.width;
                this.opacity = Math.random() * 0.4 + 0.2;
            }
        };
        Particle.prototype.draw = function() {
            ctx.fillStyle = `rgba(200, 159, 83, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        };

        const count = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 15000), 65);
        for (let i = 0; i < count; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
