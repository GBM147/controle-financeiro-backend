<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LIMITE DE GASTOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
    --cor-destaque: #2E8B57; /* Verde clássico da tela de login */
    --texto-principal: #ffffff;
    --texto-mutado: #b0bec5;
    --borda: rgba(255, 255, 255, 0.15);
}

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 20px;
    /* Fundo Mármore com película escura */
    background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), url('fundo-marmore.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--texto-principal);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Container para centralizar tudo */
.cabecalho-container, .card {
    width: 100%;
    max-width: 800px;
}

/* Estilos do Cabeçalho e Logo */
.cabecalho {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.logo-gbm {
    height: 70px;
    filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.6));
}

.titulo-pagina {
    text-align: center;
    font-size: 1.8rem;
    margin-top: 0;
    margin-bottom: 30px;
    color: var(--texto-principal);
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.btn-voltar {
    text-decoration: none;
    color: var(--texto-principal);
    font-weight: bold;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--borda);
    transition: 0.3s;
}

.btn-voltar:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* O Painel Central (Efeito Glassmorphism) */
.card {
    background: rgba(30, 34, 40, 0.65);
    backdrop-filter: blur(12px); /* Desfoque do fundo */
    padding: 30px;
    border-radius: 16px;
    border: 1px solid var(--borda);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.card h2 {
    margin-top: 0;
    font-size: 1.4rem;
    border-bottom: 1px solid var(--borda);
    padding-bottom: 15px;
    margin-bottom: 25px;
    text-align: center;
}

/* Personalização dos botões de salvar para o Verde GBM */
.btn-acao {
    padding: 10px 20px;
    border-radius: 8px;
    background: var(--cor-destaque);
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    transition: 0.2s;
}

.btn-acao:hover {
    background: #246e45; /* Verde mais escuro ao passar o rato */
    transform: translateY(-2px);
}

/* Textos da lista do editor */
#editor-container div {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

#editor-container span {
    font-size: 1.1rem;
    font-weight: 500;
}
    </style>
</head>
<body>

    <div class="cabecalho-container">
    <div class="cabecalho">
        <a href="dashboard.html" class="btn-voltar">← Voltar</a>
        <img src="logo-transparente.png" alt="Logo GBM" class="logo-gbm">
        <div style="width: 70px;"></div> <!-- Espaçador invisível para manter o logo no centro exato -->
    </div>
    <h1 class="titulo-pagina">Atenção ao Limite ⚠️</h1>
</div>
<div class="card">
        <h2>Personalize o Limite e Quando Devemos Avisar</h2>
        <div id="editor-container">
            </div>
    </div>

    <script>
        async function carregarEditor() {
            const res = await fetch('/metas-resumo'); // Reutiliza a rota anterior
            const metas = await res.json();
            const container = document.getElementById('editor-container');
            container.innerHTML = '';

            metas.forEach(m => {
                container.innerHTML += `
                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px;">
                        <span style="flex:1;">${m.categoria}</span>
                        <input type="number" id="limite-${m.categoria}" value="${m.limite}" style="width:70px;">
                        <input type="range" id="alerta-${m.categoria}" value="${m.percentual_alerta || 80}" min="10" max="100">
                        <button onclick="salvarAlteracao('${m.categoria}')" class="btn-acao">Salvar</button>
                    </div>
                `;
            });
        }

        async function salvarAlteracao(categoria) {
            const valor_limite = document.getElementById(`limite-${categoria}`).value;
            const percentual_alerta = document.getElementById(`alerta-${categoria}`).value;
            
            await fetch('/atualizar-meta-alerta', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ categoria, valor_limite, percentual_alerta })
            });
            alert("Regra de alerta atualizada!");
        }

        carregarEditor();
        // Sincroniza o tema escuro se o usuário tiver ativado no painel principal
        if (localStorage.getItem('tema') === 'dark') document.body.classList.add('dark-theme');

        async function carregarPreferencias() {
            const res = await fetch('/configuracoes-alerta');
            const data = await res.json();
            document.getElementById('range-percentual').value = data.percentual_alerta;
            atualizarDisplay();
        }

        function atualizarDisplay() {
            const val = document.getElementById('range-percentual').value;
            document.getElementById('valor-percentual').innerText = val + '%';
        }

        async function salvarPreferencias() {
            const percentual = document.getElementById('range-percentual').value;
            await fetch('/configuracoes-alerta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ percentual })
            });
        }

        async function carregarAlertas() {
            const res = await fetch('/alertas');
            const alertas = await res.json();
            const container = document.getElementById('lista-alertas');
            container.innerHTML = '';

            if (alertas.length === 0) {
                container.innerHTML = '<p style="color: var(--texto-mutated); text-align: center;">Tudo tranquilo! Nenhum limite estourado recentemente.</p>';
                return;
            }

            alertas.forEach(alerta => {
                const dataFormatada = new Date(alerta.data_criacao).toLocaleString('pt-BR');
                const div = document.createElement('div');
                div.className = `alerta-item ${alerta.lida ? 'lida' : ''}`;
                
                let btnHtml = alerta.lida 
                    ? `<span style="font-size: 0.8rem; color: var(--texto-mutated);">Visto</span>` 
                    : `<button class="btn-acao btn-lida" onclick="marcarComoLida(${alerta.id})">✔ Marcar Lida</button>`;

                div.innerHTML = `
                    <div>
                        <div class="alerta-texto">${alerta.mensagem}</div>
                        <div class="alerta-data">${dataFormatada}</div>
                    </div>
                    <div>${btnHtml}</div>
                `;
                container.appendChild(div);
            });
        }

        async function marcarComoLida(id) {
            await fetch('/alertas/marcar-lida', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            carregarAlertas(); // Recarrega a lista
        }

        carregarPreferencias();
        carregarAlertas();
    </script>
</body>
</html>
