<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | GBM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            background: #09101a url('fundo-marmorize.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #e8ecef;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        .container {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px; border-radius: 16px;
            text-align: center; max-width: 450px; width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h2 { color: #10b981; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #8a9ba8; font-size: 1rem; line-height: 1.5; margin-bottom: 30px; }
        .preco { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .sub-preco { color: #8a9ba8; font-size: 0.9rem; margin-bottom: 30px; }
        .btn-pagar {
            background: #2E8B57; color: #fff; border: none;
            padding: 15px 30px; font-size: 1.1rem; font-weight: 600;
            border-radius: 8px; width: 100%; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 139, 87, 0.4);
        }
        .btn-pagar:hover { background: #3cb371; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo-transparente.jpg" alt="GBM Logo" style="height: 60px; margin-bottom: 20px;">
        <h2 id="titulo-pagamento">Quase lá! Ative sua Conta</h2>
        <p id="descricao-pagamento">Para desbloquear o seu painel financeiro, lançamentos de despesas e importador automático de extratos OFX, ative o seu plano Premium.</p>
        
        <div id="banner-trial" style="display:none; background: rgba(16,185,129,0.12); border: 1px solid #10b981; border-radius: 10px; padding: 12px 18px; margin-bottom: 20px; color: #10b981; font-weight: 600; font-size: 0.95rem;">
            🎁 Seu 1º mês é <strong>GRÁTIS</strong>! O valor de R$ 19,90 só começa a ser cobrado no 2º mês.
        </div>

        <div class="preco">R$ 19,90</div>
        <p style="margin-bottom: 30px; font-size: 0.9rem;">Assinatura Mensal / Cancele quando quiser</p>

        <button onclick="irParaPagamento()" id="btn-action" class="btn-pagar">Ativar Acesso Agora 🚀</button>
    </div>

    <script>
        const userId = localStorage.getItem('userIdAtual');
        if(!userId) window.location.href = 'index.html';

        // Mostra o banner de trial se vier da tela de cadastro novo
        async function verificarStatusTrial() {
            try {
                const res = await fetch('/login-status?userId=' + userId);
                const data = await res.json();
                if (data.statusPagamento === 'trial') {
                    document.getElementById('banner-trial').style.display = 'block';
                    document.getElementById('titulo-pagamento').innerText = 'Ative agora — 1º mês grátis!';
                }
            } catch(e) {}
        }
        verificarStatusTrial();

        async function irParaPagamento() {
            const btn = document.getElementById('btn-action');
            btn.innerText = 'Redirecionando... ⏳';
            btn.disabled = true;

            try {
                const res = await fetch('/criar-sessao-pagamento', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                
                if(data.url) {
                    window.location.href = data.url; // Leva o usuário para o site seguro da Stripe
                } else {
                    alert('Erro ao chamar o checkout. Tente novamente.');
                    btn.innerText = 'Ativar Acesso Agora 🚀';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Erro na comunicação com o gateway.');
                btn.innerText = 'Ativar Acesso Agora 🚀';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
