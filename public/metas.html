
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Gestão de Metas | GBM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --cor-destaque: #2E8B57;
            --texto-principal: #ffffff;
            --texto-mutado: #b0bec5;
            --texto-mutated: #b0bec5;
            --borda: rgba(255, 255, 255, 0.15);
            --cor-receita: #10b981;
            --cor-despesa: #ef4444;
            --cor-alerta: #f59e0b;
            --cor-poupanca: #8b5cf6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), url('fundo-marmore.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--texto-principal);
            min-height: 100vh;
        }

        /* CABEÇALHO GBM */
        .gbm-header {
            background: transparent;
            border-bottom: 1px solid var(--borda);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .gbm-logo-container { display: flex; align-items: center; gap: 15px; }
        .gbm-logo-img {
    height: 50px;
    width: auto;
    border-radius: 8px;
    display: inline-block;
    transform-origin: center center;
    animation: spin 8s linear infinite;
}
@keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

        .gbm-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(90deg, #2E8B57 0%, #5fffa8 25%, #3d28ff 50%, #655aff 75%, #2E8B57 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gbm-shine 4s linear infinite;
        }
        @keyframes gbm-shine {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .btn-voltar {
            text-decoration: none;
            color: var(--texto-principal);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            background: #0f1a2b;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(95, 255, 168, 0.25);
            transition: 0.3s;
        }
        .btn-voltar:hover {
            border-color: #5fffa8;
            box-shadow: 0 0 14px rgba(95, 255, 168, 0.3);
        }

        .page-wrapper { max-width: 800px; margin: 0 auto; padding: 20px; }

        .titulo-pagina {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 10px 0 25px 0;
        }

        /* CARD MODERNO */
        .card {
            background: #0f1a2b;
            border: 1px solid rgba(95, 255, 168, 0.22);
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(95, 255, 168, 0.05) inset;
            padding: 25px 30px;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.25s ease;
        }
        .card:hover {
            border-color: rgba(95, 255, 168, 0.45);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.55), 0 0 14px rgba(95, 255, 168, 0.12);
        }
        .card h2 {
            margin-top: 0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .meta-item { margin-bottom: 30px; }
        .meta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.05rem;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 0.5px;
        }
        .barra-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .barra-progresso { height: 100%; transition: width 0.5s ease-in-out; border-radius: 5px; }
        .meta-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--texto-mutado);
            font-family: 'Rajdhani', sans-serif;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #fff;
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .gbm-title { display: none; }
            .gbm-logo-img { height: 40px; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>

<header class="gbm-header">
    <div class="gbm-logo-container">
        <img src="logo-transparente.jpg" alt="Logo GBM" class="gbm-logo-img">
        <h1 class="gbm-title">Guardian Of Budget & Money</h1>
    </div>
    <a href="dashboard.html" class="btn-voltar">Voltar</a>
</header>

<div class="page-wrapper">
    <h1 class="titulo-pagina">Minhas Metas 🎯</h1>

    <div class="card" id="lista-metas">
        <h2>Carregando suas metas...</h2>
    </div>
</div>

    <script>
       async function carregarMetas() {
            try {
                const res = await fetch('/metas-resumo');
                const json = await res.json();

                let metas = json.data ? json.data : (Array.isArray(json) ? json : []);
                
                const despesasPadrao = ["Alimentação", "Habitação", "Transporte", "Eletricidade / Luz", "Telecomunicações / Internet", "Pagamento de Fatura", "Pagamento de Boleto", "Streaming de Vídeo", "Streaming de Música", "Academia e Fitness", "Saúde", "Educação", "Supermercado", "Restaurantes", "Salário", "Lazer", "Outros"];

                // FILTRO MÁGICO INVERSO: Mantém apenas o que NÃO está na lista padrão
                metas = metas.filter(m => m.categoria && !despesasPadrao.includes(m.categoria));

                const container = document.getElementById('lista-metas');
                
                if (metas.length === 0) {
                    container.innerHTML = '<h2>Minhas Metas</h2><p style="color: var(--texto-mutated);">Nenhuma meta de economia definida ainda. Vá ao Dashboard e crie um Objetivo!</p>';
                    return;
                }

                // Usamos uma variável para construir o HTML e injetar tudo de uma vez
                let html = '<h2>Acompanhamento de Metas 🎯</h2>';

                metas.forEach(m => {
                    const limite = parseFloat(String(m.limite || 0).replace(/[R$\s+\-]/g, ''));
                    const gasto = parseFloat(String(m.gasto || 0).replace(/[R$\s+\-]/g, ''));

                    let percentual = limite > 0 ? (gasto / limite) * 100 : 0;
                    const larguraBarra = Math.min(percentual, 100);

                    let cor = '';
                    const badge = '<span class="badge" style="background: var(--cor-poupanca);">Objetivo 🎯</span>';

                    if (percentual < 50) cor = 'var(--cor-alerta)';
                    else if (percentual < 100) cor = '#3b82f6';
                    else cor = 'var(--cor-receita)';

                    html += `
                        <div class="meta-item">
                            <div class="meta-header">
                                <div>
                                    <strong>${m.categoria}</strong>
                                    ${badge}
                                </div>
                                <strong style="color: ${cor};">${percentual.toFixed(1)}%</strong>
                            </div>
                            <div class="barra-container">
                                <div class="barra-progresso" style="width: ${larguraBarra}%; background: ${cor};"></div>
                            </div>
                            <div class="meta-footer">
                                <span>R$ ${gasto.toFixed(2)} de R$ ${limite.toFixed(2)}</span>
                                <span>Guardado</span>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (error) {
                console.error("Erro Fatal:", error);
                document.getElementById('lista-metas').innerHTML = '<h2 style="color: #ff4d4d;">Erro de Sistema</h2><p style="color: var(--texto-mutated);">Ocorreu uma falha ao processar os dados. Verifique a conexão.</p>';
            }
        }
        carregarMetas();
    </script>
</body>
</html>
