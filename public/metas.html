<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Metas Financeiras | GBM</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="gbm-pages.css">
    <style>
        .objetivo-card { position: relative; overflow: hidden; }
        .objetivo-card::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
            background: var(--objetivo-cor, var(--purple));
        }
        .objetivo-topo { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
        .objetivo-topo h3 { margin-bottom:4px; font-size:1.25rem; }
        .objetivo-valores { display:flex; justify-content:space-between; gap:12px; margin:14px 0 8px; color:var(--muted); font-size:.82rem; }
        .objetivo-valores strong { color:var(--text); }
        .objetivo-actions { margin-top:16px; }
        dialog {
            width:min(520px, calc(100% - 28px));
            border:1px solid var(--border);
            border-radius:16px;
            background:var(--card);
            color:var(--text);
            padding:22px;
        }
        dialog::backdrop { background:rgba(0,0,0,.72); backdrop-filter:blur(5px); }
    </style>
    <link rel="stylesheet" href="gbm-tutorial.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="dashboard.html">
            <img src="logo-transparente.jpg" alt="GBM">
            <span>Guardian of Budget & Money</span>
        </a>
        <div class="top-actions">
            <a class="btn btn-small" href="Limite-de-Gastos.html">Limites</a>
            <a class="btn btn-small" href="dashboard.html">← Dashboard</a>
        </div>
    </header>

    <main class="container">
        <div class="page-title">
            <h1>Metas financeiras</h1>
            <p>Crie objetivos reais, registre contribuições e acompanhe quanto falta para chegar lá.</p>
        </div>

        <section class="card">
            <h2 id="titulo-form">Criar nova meta</h2>
            <form id="form-objetivo" class="form-grid">
                <input type="hidden" id="objetivo-id">
                <div class="field">
                    <label for="objetivo-nome">Nome do objetivo</label>
                    <input id="objetivo-nome" maxlength="120" placeholder="Ex.: Viagem, reserva de emergência" required>
                </div>
                <div class="field">
                    <label for="objetivo-valor">Valor desejado</label>
                    <input id="objetivo-valor" type="number" min="0.01" step="0.01" placeholder="R$ 0,00" required>
                </div>
                <div class="field">
                    <label for="objetivo-inicial">Já tenho guardado</label>
                    <input id="objetivo-inicial" type="number" min="0" step="0.01" value="0">
                </div>
                <div class="field">
                    <label for="objetivo-prazo">Prazo desejado</label>
                    <input id="objetivo-prazo" type="date">
                </div>
                <div class="field">
                    <label for="objetivo-cor">Cor</label>
                    <input id="objetivo-cor" type="color" value="#8b5cf6">
                </div>
                <div class="field" style="justify-content:end">
                    <div class="actions end">
                        <button type="button" id="cancelar-edicao" class="btn" hidden>Cancelar</button>
                        <button class="btn btn-primary" type="submit">Salvar meta</button>
                    </div>
                </div>
            </form>
        </section>

        <div class="divider"></div>
        <section id="lista-objetivos" class="grid grid-2">
            <div class="empty">Carregando suas metas...</div>
        </section>
    </main>

    <dialog id="dialog-contribuicao">
        <h2>Adicionar contribuição</h2>
        <p id="contribuicao-titulo" style="color:var(--muted)"></p>
        <form id="form-contribuicao" class="form-grid">
            <input type="hidden" id="contribuicao-objetivo-id">
            <div class="field">
                <label for="contribuicao-valor">Valor guardado</label>
                <input id="contribuicao-valor" type="number" min="0.01" step="0.01" required>
            </div>
            <div class="field">
                <label for="contribuicao-data">Data</label>
                <input id="contribuicao-data" type="date" required>
            </div>
            <div class="field full">
                <label for="contribuicao-observacao">Observação</label>
                <input id="contribuicao-observacao" maxlength="180" placeholder="Ex.: depósito mensal">
            </div>
            <div class="field full">
                <div class="actions end">
                    <button type="button" class="btn" onclick="document.getElementById('dialog-contribuicao').close()">Cancelar</button>
                    <button class="btn btn-primary">Adicionar</button>
                </div>
            </div>
        </form>
    </dialog>

    <script src="auth.js"></script>
    <script src="gbm-pages.js"></script>
    <script>
        let objetivos = [];
        const hoje = new Date().toISOString().slice(0, 10);
        document.getElementById('contribuicao-data').value = hoje;

        async function carregarObjetivos() {
            try {
                objetivos = await gbmJson(await fetchApi('/objetivos'));
                renderizarObjetivos();
            } catch (erro) {
                document.getElementById('lista-objetivos').innerHTML =
                    `<div class="empty">${gbmEscapar(erro.message)}</div>`;
            }
        }

        function renderizarObjetivos() {
            const container = document.getElementById('lista-objetivos');
            if (!objetivos.length) {
                container.innerHTML = '<div class="empty">Nenhuma meta criada ainda. Comece pela sua prioridade financeira.</div>';
                return;
            }
            container.innerHTML = objetivos.map((objetivo) => {
                const guardado = Number(objetivo.valor_guardado || 0);
                const meta = Number(objetivo.valor_meta || 0);
                const percentual = meta > 0 ? Math.min((guardado / meta) * 100, 100) : 0;
                const concluido = objetivo.status === 'concluido' || guardado >= meta;
                return `
                    <article class="card objetivo-card" style="--objetivo-cor:${gbmEscapar(objetivo.cor)}">
                        <div class="objetivo-topo">
                            <div>
                                <h3>${gbmEscapar(objetivo.nome)}</h3>
                                <span class="pill ${concluido ? 'green' : 'blue'}">${concluido ? '✓ Concluída' : gbmData(objetivo.prazo)}</span>
                            </div>
                            <strong>${percentual.toFixed(1)}%</strong>
                        </div>
                        <div class="objetivo-valores">
                            <span>Guardado<br><strong>${gbmMoeda(guardado)}</strong></span>
                            <span style="text-align:right">Objetivo<br><strong>${gbmMoeda(meta)}</strong></span>
                        </div>
                        <div class="progress"><span style="width:${percentual}%;background:${gbmEscapar(objetivo.cor)}"></span></div>
                        <p class="stat">Faltam <strong>${gbmMoeda(Math.max(meta - guardado, 0))}</strong></p>
                        <div class="actions objetivo-actions">
                            <button class="btn btn-primary btn-small" onclick="abrirContribuicao(${objetivo.id})">+ Contribuir</button>
                            <button class="btn btn-small" onclick="editarObjetivo(${objetivo.id})">Editar</button>
                            <button class="btn btn-danger btn-small" onclick="excluirObjetivo(${objetivo.id})">Excluir</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        document.getElementById('form-objetivo').addEventListener('submit', async (evento) => {
            evento.preventDefault();
            const id = document.getElementById('objetivo-id').value;
            const payload = {
                nome: document.getElementById('objetivo-nome').value,
                valor_meta: Number(document.getElementById('objetivo-valor').value),
                valor_inicial: Number(document.getElementById('objetivo-inicial').value || 0),
                prazo: document.getElementById('objetivo-prazo').value || null,
                cor: document.getElementById('objetivo-cor').value
            };
            try {
                await gbmJson(await fetchApi(id ? `/objetivos/${id}` : '/objetivos', {
                    method: id ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }));
                gbmToast(id ? 'Meta atualizada.' : 'Meta criada.');
                limparFormulario();
                carregarObjetivos();
            } catch (erro) {
                gbmToast(erro.message, 'erro');
            }
        });

        function editarObjetivo(id) {
            const objetivo = objetivos.find((item) => Number(item.id) === Number(id));
            if (!objetivo) return;
            document.getElementById('objetivo-id').value = objetivo.id;
            document.getElementById('objetivo-nome').value = objetivo.nome;
            document.getElementById('objetivo-valor').value = objetivo.valor_meta;
            document.getElementById('objetivo-inicial').value = 0;
            document.getElementById('objetivo-inicial').disabled = true;
            document.getElementById('objetivo-prazo').value = objetivo.prazo ? String(objetivo.prazo).slice(0, 10) : '';
            document.getElementById('objetivo-cor').value = objetivo.cor || '#8b5cf6';
            document.getElementById('titulo-form').textContent = 'Editar meta';
            document.getElementById('cancelar-edicao').hidden = false;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function limparFormulario() {
            document.getElementById('form-objetivo').reset();
            document.getElementById('objetivo-id').value = '';
            document.getElementById('objetivo-cor').value = '#8b5cf6';
            document.getElementById('objetivo-inicial').disabled = false;
            document.getElementById('titulo-form').textContent = 'Criar nova meta';
            document.getElementById('cancelar-edicao').hidden = true;
        }
        document.getElementById('cancelar-edicao').addEventListener('click', limparFormulario);

        function abrirContribuicao(id) {
            const objetivo = objetivos.find((item) => Number(item.id) === Number(id));
            document.getElementById('contribuicao-objetivo-id').value = id;
            document.getElementById('contribuicao-titulo').textContent = objetivo?.nome || '';
            document.getElementById('contribuicao-valor').value = '';
            document.getElementById('contribuicao-observacao').value = '';
            document.getElementById('dialog-contribuicao').showModal();
        }

        document.getElementById('form-contribuicao').addEventListener('submit', async (evento) => {
            evento.preventDefault();
            const id = document.getElementById('contribuicao-objetivo-id').value;
            try {
                await gbmJson(await fetchApi(`/objetivos/${id}/contribuicoes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        valor: Number(document.getElementById('contribuicao-valor').value),
                        data: document.getElementById('contribuicao-data').value,
                        observacao: document.getElementById('contribuicao-observacao').value
                    })
                }));
                document.getElementById('dialog-contribuicao').close();
                gbmToast('Contribuição adicionada.');
                carregarObjetivos();
            } catch (erro) {
                gbmToast(erro.message, 'erro');
            }
        });

        async function excluirObjetivo(id) {
            if (!confirm('Excluir esta meta e todo o histórico de contribuições?')) return;
            try {
                await gbmJson(await fetchApi(`/objetivos/${id}`, { method: 'DELETE' }));
                gbmToast('Meta excluída.');
                carregarObjetivos();
            } catch (erro) {
                gbmToast(erro.message, 'erro');
            }
        }

        carregarObjetivos();
    </script>
    <script src="gbm-tutorial.js"></script>
</body>
</html>
