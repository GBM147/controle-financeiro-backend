<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Metas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-principal: #121212; --bg-card: #1e1e1e; --texto-principal: #f8f9fa;
            --texto-mutated: #a0a0a0; --borda: #333333; --cor-receita: #10b981;
            --cor-despesa: #ef4444; --cor-alerta: #f59e0b; --cor-poupanca: #8b5cf6;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-principal); color: var(--texto-principal); padding: 20px; max-width: 800px; margin: 0 auto; }
        a.btn-voltar { color: #3b82f6; text-decoration: none; font-weight: bold; font-size: 1rem; margin-bottom: 20px; display: inline-block; }
        a.btn-voltar:hover { text-decoration: underline; }
        
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--borda); margin-top: 10px; max-width: 800px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h2 { margin-top: 0; border-bottom: 1px solid var(--borda); padding-bottom: 15px; margin-bottom: 25px; }
        
        .meta-item { margin-bottom: 30px; }
        .meta-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 1rem; }
        .barra-container { width: 100%; height: 10px; background: var(--borda); border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
        .barra-progresso { height: 100%; transition: width 0.5s ease-in-out; border-radius: 5px; }
        .meta-footer { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--texto-mutated); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: #fff; margin-left: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <h1>Metas</h1>
    <a href="dashboard.html" class="btn-voltar">← Voltar ao Dashboard</a>

    <div class="card" id="lista-metas">
        <h2>Carregando suas metas...</h2>
    </div>

    <script>
        // Herda o tema escuro
        if (localStorage.getItem('tema') === 'light') {
            document.body.classList.remove('dark-theme'); // Se no futuro fizeres um tema claro
        }

        async function carregarMetas() {
            try {
                const res = await fetch('/metas-resumo');
                const json = await res.json();
                
let metas = json.data ? json.data : (Array.isArray(json) ? json : []);

// Filtra a lista para exibir APENAS as categorias de poupança
metas = metas.filter(m => m.categoria === 'Savings' || m.categoria === 'Poupança');

const container = document.getElementById('lista-metas');
                if (metas.length === 0) {
                    container.innerHTML = '<h2>Suas Metas Ativas</h2><p style="color: var(--texto-mutated);">Nenhum orçamento definido ainda. Vá ao Dashboard e crie um!</p>';
                    return;
                }

                container.innerHTML = '<h2>Suas Metas Ativas</h2>';

                metas.forEach(m => {
                    // A CORREÇÃO DO ERRO ZERO: Forçamos a limpeza da string para número puro
                    const limite = parseFloat(String(m.limite || 0).replace(/[R$\s+\-]/g, ''));
                    const gasto = parseFloat(String(m.gasto || 0).replace(/[R$\s+\-]/g, ''));
                    
                    let percentual = limite > 0 ? (gasto / limite) * 100 : 0;
                    
                    // Trava visual para a barra não sair do ecrã se passar dos 100%
                    const larguraBarra = Math.min(percentual, 100); 
                    
                    let cor = '';
                    let badge = '';

                    // --- LÓGICA INTELIGENTE: É POUPANÇA OU DESPESA? ---
                    if (m.categoria === 'Savings' || m.categoria === 'Poupança') {
                        badge = '<span class="badge" style="background: var(--cor-poupanca);">Objetivo</span>';
                        // Quanto mais, melhor:
                        if (percentual < 50) cor = 'var(--cor-alerta)'; // Laranja (Pouco guardado)
                        else if (percentual < 100) cor = '#3b82f6'; // Azul (No caminho)
                        else cor = 'var(--cor-receita)'; // Verde (Meta Batida!)
                    } else {
                        badge = '<span class="badge" style="background: var(--texto-mutated);">Limite</span>';
                        // Quanto mais, pior (Despesa):
                        if (percentual < 75) cor = 'var(--cor-receita)'; // Verde (Tranquilo)
                        else if (percentual < 100) cor = 'var(--cor-alerta)'; // Laranja (Atenção)
                        else cor = 'var(--cor-despesa)'; // Vermelho (Estourou)
                    }

                    // Monta o visual de cada meta
                    container.innerHTML += `
                        <div class="meta-item">
                            <div class="meta-header">
                                <div>
                                    <strong>${m.categoria}</strong>
                                    ${badge}
                                </div>
                                <strong style="color: ${cor};">${percentual.toFixed(1)}%</strong>
                            </div>
                            <div class="barra-container">
                                <div class="barra-progresso" style="width: ${larguraBarra}%; background: ${cor};"></div>
                            </div>
                            <div class="meta-footer">
                                <span>R$ ${gasto.toFixed(2)} de R$ ${limite.toFixed(2)}</span>
                                <span>${m.categoria === 'Savings' || m.categoria === 'Poupança' ? 'Guardado' : 'Gasto'}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('lista-metas').innerHTML = '<p>Erro de comunicação com o servidor.</p>';
            }
        }

        carregarMetas();
    </script>
</body>
</html>
