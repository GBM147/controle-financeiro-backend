<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Comparativo Mensal | GBM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --cor-destaque: #2E8B57;
            --cor-destaque-hover: #246e45;
            --texto-principal: #ffffff;
            --texto-mutado: #b0bec5;
            --borda: rgba(255, 255, 255, 0.15);
            --cor-receita: #10b981;
            --cor-despesa: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), url('fundo-marmore.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--texto-principal);
            min-height: 100vh;
        }

        /* CABEÇALHO GBM */
        .gbm-header {
            background: transparent;
            border-bottom: 1px solid var(--borda);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .gbm-logo-container { display: flex; align-items: center; gap: 15px; }
        .gbm-logo-img { height: 50px; width: auto; border-radius: 8px; }
        .gbm-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(90deg, #2E8B57 0%, #5fffa8 25%, #3d28ff 50%, #655aff 75%, #2E8B57 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gbm-shine 4s linear infinite;
        }
        @keyframes gbm-shine {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .btn-voltar {
            text-decoration: none;
            color: var(--texto-principal);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            background: #0f1a2b;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(95, 255, 168, 0.25);
            transition: 0.3s;
        }
        .btn-voltar:hover {
            border-color: #5fffa8;
            box-shadow: 0 0 14px rgba(95, 255, 168, 0.3);
        }

        .page-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .titulo-pagina {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 10px 0 25px 0;
        }

        /* CARD MODERNO */
        .card {
            background: #0f1a2b;
            border: 1px solid rgba(95, 255, 168, 0.22);
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(95, 255, 168, 0.05) inset;
            padding: 25px 30px;
            margin-bottom: 20px;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.25s ease;
        }
        .card:hover {
            border-color: rgba(95, 255, 168, 0.45);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.55), 0 0 14px rgba(95, 255, 168, 0.12);
        }

        /* Filtros */
        .filtros { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .filtros select {
            background: rgba(10, 18, 32, 0.6);
            border: 1px solid var(--borda);
            color: var(--texto-principal);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }
        .filtros select:focus {
            border-color: var(--cor-destaque);
            box-shadow: 0 0 10px rgba(46,139,87,0.3);
        }

        .btn-acao {
            padding: 10px 22px;
            border-radius: 8px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-gerar { background: var(--cor-destaque); color: white; }
        .btn-gerar:hover { background: var(--cor-destaque-hover); transform: translateY(-1px); }

        /* Resumo do ano */
        .resumo-ano {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .resumo-item {
            flex: 1;
            min-width: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(95, 255, 168, 0.15);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 0.85rem;
            color: var(--texto-mutado);
            font-family: 'Rajdhani', sans-serif;
        }
        .resumo-item strong { display: block; font-size: 1.3rem; margin-top: 4px; letter-spacing: 0.5px; }

        /* Gráfico */
        .grafico-wrapper { height: 380px; position: relative; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        thead tr { border-bottom: 2px solid rgba(255,255,255,0.1); }
        th {
            padding: 12px 15px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--texto-mutado);
        }
        td {
            padding: 13px 15px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-family: 'Rajdhani', sans-serif;
        }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody tr:last-child td { border-bottom: none; }
        tr.linha-melhor-mes { background: rgba(16,185,129,0.08); }
        tr.linha-pior-mes { background: rgba(239,68,68,0.08); }

        .badge-mini {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 700;
            margin-left: 8px;
            vertical-align: middle;
        }
        .badge-melhor { background: rgba(16,185,129,0.2); color: var(--cor-receita); }
        .badge-pior { background: rgba(239,68,68,0.2); color: var(--cor-despesa); }

        .texto-vazio {
            text-align: center;
            color: var(--texto-mutado);
            padding: 30px 0;
            font-size: 0.95rem;
        }
        /* Partículas — conteúdo fica acima do canvas */
.gbm-header { z-index: 10; }
.card, .page-wrapper { position: relative; z-index: 1; }

/* Logo flutuante */
.gbm-logo-img {
    animation: float-logo 4s ease-in-out infinite;
}
@keyframes float-logo {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
}

/* Brilho nos botões */
.btn-acao, .btn-voltar {
    position: relative;
    overflow: hidden;
}
.btn-acao::after, .btn-voltar::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 30%; height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    animation: btn-shine 4s infinite ease-in-out;
}
@keyframes btn-shine {
    0%   { left: -60%; }
    15%  { left: 130%; }
    100% { left: 130%; }
}
        @media (max-width: 768px) {
            .gbm-title { display: none; }
            .gbm-logo-img { height: 40px; }
            .card { padding: 18px; }
            .grafico-wrapper { height: 280px; }
        }
    </style>
</head>
<body>
<canvas id="particles-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></canvas>
<header class="gbm-header">
    <div class="gbm-logo-container">
        <img src="logo-transparente.jpg" alt="Logo GBM" class="gbm-logo-img">
        <h1 class="gbm-title">Guardian Of Budget & Money</h1>
    </div>
    <a href="dashboard.html" class="btn-voltar">Voltar</a>
</header>

<div class="page-wrapper">

    <h2 class="titulo-pagina">📆 Comparativo Mensal</h2>

    <div class="card">
        <div class="filtros">
            <select id="ano-ref"></select>
            <button class="btn-acao btn-gerar" onclick="carregarComparativo()">Atualizar</button>
        </div>
    </div>

    <div class="card" id="card-resultado">
        <div id="resultado-comparativo">
            <p class="texto-vazio">Carregando...</p>
        </div>
    </div>
</div>

<script src="auth.js"></script>
    <script>
        // Recupera o userId salvo
        function pegarUserId() {
            return localStorage.getItem('userIdAtual') || sessionStorage.getItem('userIdAtual');
        }

        // --- GUARDA DE ACESSO PREMIUM ---
        (async function verificarAcessoPremium() {
            const userId = pegarUserId();
            if (!userId) {
                window.location.href = 'index.html';
                return;
            }
            try {
                const res = await fetchApi('/login-status?userId=' + userId);
                const data = await res.json();

                let isPremium = false;
                if (data.statusPagamento === 'pago') {
                    isPremium = true;
                } else if (data.statusPagamento === 'trial' || data.statusPagamento === 'cancelado') {
                    if (data.trialExpira && new Date() <= new Date(data.trialExpira)) {
                        isPremium = true;
                    }
                }

                if (!isPremium) {
                    // Se não for Premium, expulsa para a tela de pagamento
                    window.location.href = 'pagamento.html';
                }
            } catch (e) {
                window.location.href = 'index.html';
            }
        })();

        let meuGraficoComparativo = null;

        const NOMES_MESES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                              'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const NOMES_MESES_ABREV = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

        async function carregarAnosDisponiveis() {
            const select = document.getElementById('ano-ref');
            const anoAtual = new Date().getFullYear();
            try {
                const userId = pegarUserId();
                const res = await fetchApi(`/anos-disponiveis?userId=${userId}`);
                const anos = await res.json();

                if (!anos.includes(anoAtual)) anos.unshift(anoAtual);
                anos.sort((a, b) => b - a);

                select.innerHTML = anos.map(a => `<option value="${a}">${a}</option>`).join('');
            } catch (e) {
                select.innerHTML = `<option value="${anoAtual}">${anoAtual}</option>`;
            }
        }

        async function carregarComparativo() {
            const ano = document.getElementById('ano-ref').value;
            const container = document.getElementById('resultado-comparativo');
            container.innerHTML = '<p class="texto-vazio">Carregando...</p>';

            try {
                const userId = pegarUserId();
                const res = await fetchApi(`/comparativo-mensal?userId=${userId}&ano=${ano}`);
                const dados = await res.json();

                if (!dados || dados.length === 0) {
                    container.innerHTML = `<p class="texto-vazio">Nenhum dado encontrado para ${ano}.</p>`;
                    if (meuGraficoComparativo) { meuGraficoComparativo.destroy(); meuGraficoComparativo = null; }
                    return;
                }

                // Monta um array com os 12 meses, preenchendo com zero quem não tem dado
                const mesesCompletos = [];
                for (let m = 1; m <= 12; m++) {
                    const encontrado = dados.find(d => d.mes === m);
                    mesesCompletos.push({
                        mes: m,
                        entradas: encontrado ? parseFloat(encontrado.entradas) || 0 : 0,
                        saidas: encontrado ? parseFloat(encontrado.saidas) || 0 : 0,
                        temDados: !!encontrado
                    });
                }

                const mesesComDados = mesesCompletos.filter(m => m.temDados);

                if (mesesComDados.length === 0) {
                    container.innerHTML = `<p class="texto-vazio">Nenhum dado encontrado para ${ano}.</p>`;
                    if (meuGraficoComparativo) { meuGraficoComparativo.destroy(); meuGraficoComparativo = null; }
                    return;
                }

                // Totais do ano
                const totalEntradas = mesesComDados.reduce((s, m) => s + m.entradas, 0);
                const totalSaidas = mesesComDados.reduce((s, m) => s + m.saidas, 0);
                const mediaGastoMensal = totalSaidas / mesesComDados.length;

                // Melhor mês (menor gasto) e pior mês (maior gasto)
                let melhorMes = mesesComDados[0];
                let piorMes = mesesComDados[0];
                mesesComDados.forEach(m => {
                    if (m.saidas < melhorMes.saidas) melhorMes = m;
                    if (m.saidas > piorMes.saidas) piorMes = m;
                });

                let html = `
                    <div class="resumo-ano">
                        <div class="resumo-item">Total de Entradas
                            <strong style="color: var(--cor-receita);">R$ ${totalEntradas.toFixed(2)}</strong>
                        </div>
                        <div class="resumo-item">Total de Saídas
                            <strong style="color: var(--cor-despesa);">R$ ${totalSaidas.toFixed(2)}</strong>
                        </div>
                        <div class="resumo-item">Média de Gasto Mensal
                            <strong>R$ ${mediaGastoMensal.toFixed(2)}</strong>
                        </div>
                        <div class="resumo-item">Mês mais econômico
                            <strong style="color: var(--cor-receita);">${NOMES_MESES[melhorMes.mes]}</strong>
                        </div>
                    </div>

                    <div class="grafico-wrapper">
                        <canvas id="graficoComparativo"></canvas>
                    </div>

                    <table style="margin-top: 25px;">
                        <thead>
                            <tr>
                                <th>Mês</th>
                                <th style="text-align: right;">Entradas</th>
                                <th style="text-align: right;">Saídas</th>
                                <th style="text-align: right;">Resultado</th>
                            </tr>
                        </thead>
                        <tbody>`;

                mesesCompletos.forEach(m => {
                    if (!m.temDados) return;
                    const resultado = m.entradas - m.saidas;
                    const corResultado = resultado >= 0 ? 'var(--cor-receita)' : 'var(--cor-despesa)';
                    let classeLinha = '';
                    let badge = '';
                    if (m.mes === melhorMes.mes) { classeLinha = 'linha-melhor-mes'; badge = '<span class="badge-mini badge-melhor">MENOR GASTO</span>'; }
                    if (m.mes === piorMes.mes && piorMes.mes !== melhorMes.mes) { classeLinha = 'linha-pior-mes'; badge = '<span class="badge-mini badge-pior">MAIOR GASTO</span>'; }

                    html += `
                        <tr class="${classeLinha}">
                            <td style="font-weight: 600;">${NOMES_MESES[m.mes]}${badge}</td>
                            <td style="text-align: right; color: var(--cor-receita);">R$ ${m.entradas.toFixed(2)}</td>
                            <td style="text-align: right; color: var(--cor-despesa);">R$ ${m.saidas.toFixed(2)}</td>
                            <td style="text-align: right; font-weight: 700; color: ${corResultado};">R$ ${resultado.toFixed(2)}</td>
                        </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

                desenharGrafico(mesesCompletos);

            } catch (error) {
                console.error(error);
                container.innerHTML = '<p class="texto-vazio">Erro ao carregar o comparativo. Tente novamente.</p>';
            }
        }

        function desenharGrafico(mesesCompletos) {
            if (meuGraficoComparativo) meuGraficoComparativo.destroy();
            const ctx = document.getElementById('graficoComparativo').getContext('2d');

            meuGraficoComparativo = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: mesesCompletos.map(m => NOMES_MESES_ABREV[m.mes]),
                    datasets: [
                        {
                            label: 'Entradas',
                            data: mesesCompletos.map(m => m.entradas),
                            backgroundColor: 'rgba(46, 139, 87, 0.75)',
                            borderColor: '#2E8B57',
                            borderWidth: 1,
                            borderRadius: 5
                        },
                        {
                            label: 'Saídas',
                            data: mesesCompletos.map(m => m.saidas),
                            backgroundColor: 'rgba(239, 68, 68, 0.75)',
                            borderColor: '#ef4444',
                            borderWidth: 1,
                            borderRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#ffffff' } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#ffffff' }, beginAtZero: true }
                    },
                    plugins: {
                        legend: { labels: { color: '#ffffff' } }
                    }
                }
            });
        }

        // --- SISTEMA GBM DE NOTIFICAÇÕES/CONFIRMAÇÕES (padronizado em todas as páginas) ---
        let _resolveConfirm = null;

        function gbmAlerta(mensagem, tipo = 'info') {
            const cor   = tipo === 'erro'  ? 'rgba(239,68,68,0.3)'
                        : tipo === 'aviso' ? 'rgba(245,158,11,0.3)'
                        :                    'rgba(95,255,168,0.3)';
            const icone = tipo === 'erro'  ? '❌'
                        : tipo === 'aviso' ? '⚠️'
                        :                    '✅';

            document.getElementById('lista-notificacoes-modal').innerHTML = `
                <div style="background:rgba(15,23,42,0.8); border:1px solid ${cor}; border-radius:10px; padding:20px; font-family:'Inter',sans-serif; font-size:0.95rem; line-height:1.6; text-align:center;">
                    <div style="font-size:2.2rem; margin-bottom:12px;">${icone}</div>
                    ${mensagem}
                </div>`;

            document.getElementById('btn-confirmar-modal').style.display = 'none';
            document.getElementById('btn-fechar-modal').innerText = 'FECHAR';
            document.getElementById('modal-notificacoes').style.display = 'flex';
            _resolveConfirm = null;
        }

        function gbmConfirmar(mensagem) {
            return new Promise(resolve => {
                _resolveConfirm = resolve;

                document.getElementById('lista-notificacoes-modal').innerHTML = `
                    <div style="background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.4); border-radius:10px; padding:20px; font-family:'Inter',sans-serif; font-size:0.95rem; line-height:1.6; text-align:center;">
                        <div style="font-size:2.2rem; margin-bottom:12px;">⚠️</div>
                        ${mensagem}
                    </div>`;

                document.getElementById('btn-confirmar-modal').style.display = 'block';
                document.getElementById('btn-fechar-modal').innerText = 'CANCELAR';
                document.getElementById('modal-notificacoes').style.display = 'flex';
            });
        }

        function fecharModalNotificacoes(confirmado = false) {
            document.getElementById('modal-notificacoes').style.display = 'none';
            if (_resolveConfirm) {
                _resolveConfirm(confirmado);
                _resolveConfirm = null;
            }
        }

        // --- INICIALIZAÇÃO ---
        (async function iniciar() {
            await carregarAnosDisponiveis();
            carregarComparativo();
        })();
    </script>

    <!-- MODAL DE NOTIFICAÇÕES GBM -->
    <div id="modal-notificacoes" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); z-index:99999; align-items:center; justify-content:center;">
        <div style="background:#0f1a2b; border:1px solid rgba(95,255,168,0.3); border-radius:16px; padding:30px; max-width:460px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.7);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="logo-transparente.jpg" alt="GBM" style="height:28px;">
                    <span style="font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; letter-spacing:2px; color:#5fffa8;">GBM — NOTIFICAÇÕES</span>
                </div>
                <button onclick="fecharModalNotificacoes(false)" style="background:none; border:none; color:#b0bec5; font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
            </div>
            <div id="lista-notificacoes-modal"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="btn-confirmar-modal" onclick="fecharModalNotificacoes(true)" style="display:none; flex:1; padding:12px; background:#2E8B57; color:#fff; border:none; border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='#246e45'" onmouseout="this.style.background='#2E8B57'">CONFIRMAR</button>
                <button id="btn-fechar-modal" onclick="fecharModalNotificacoes(false)" style="flex:1; padding:12px; background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.15); border-radius:8px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">FECHAR</button>
            </div>
        </div>
    </div>
<script>
    (function() {
        const canvas = document.getElementById('particles-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function Particle() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 100;
            this.size = Math.random() * 2.5 + 0.8;
            this.speedY = Math.random() * 1.2 + 0.3;
            this.opacity = Math.random() * 0.4 + 0.2;
        }
        Particle.prototype.update = function() {
            this.y -= this.speedY;
            if (this.y < -10) {
                this.y = canvas.height + 10;
                this.x = Math.random() * canvas.width;
                this.opacity = Math.random() * 0.4 + 0.2;
            }
        };
        Particle.prototype.draw = function() {
            ctx.fillStyle = `rgba(200, 159, 83, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        };

        const count = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 15000), 65);
        for (let i = 0; i < count; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
</body>
</html>
